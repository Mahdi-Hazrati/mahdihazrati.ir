# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: مهدی حضرتی - وبسایت شخصی - برنامه نویس
email: contact@mahdihazrati.ir
description: >- # this means to ignore newlines until "baseurl:"
  وبسایت شخصی مهدی حضرتی برنامه نویس و توسعه دهنده فرانت اند - نمونه کار پست های بلاگ و روزمره نویسی ها
github_username: Mahdi-Hazrati
minimal_mistakes_skin: default # => "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"
search: true
locale: "fa-IR"
lang: "fa"
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: IR # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "مهدی حضرتی"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "به وبسایت شخصی من خوش آمدید من یک برنامه نویس هستم که علاقه زیادی به ساخت چیز های جدید دارم"
  links:
    - label: "وبسایت"
      icon: "fas fa-fw fa-link"
      url: "https://mahdi-hazrati.github.io/"
    - label: "گیت هاب"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mahdi-Hazrati"

footer:
  links:
    - label: "باگ داره؟ در گیت هاب ویرایش کنید."
      icon: "fab fa-fw fa-github"
      url: "https://github.com/Mahdi-Hazrati/mahdihazrati.ir"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
